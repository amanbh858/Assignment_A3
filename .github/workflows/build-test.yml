name: Build-Test-Deploy
on:
  push:
    branches:
      - main  # Trigger the workflow on push to the main branch

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - uses: actions/checkout@v4

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build the Docker image with the custom tag
      - name: Build the Docker image
        run: docker build -t amanbh858/assignment_a3:12b8e5ff56c7 .  # Build your image with custom tag

      # Start Docker Compose and check the services
      - name: Start Docker Compose
        run: |
          docker-compose up flask-app -d  # Start Flask app container
          docker-compose ps  # Check the status of services

      # Run tests using pytest
      - name: Run Tests
        run: docker-compose exec flask-app pytest || exit 1  # Run tests with pytest

      # Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  # Docker Hub username from secrets
          password: ${{ secrets.DOCKERHUB_PASSWORD }}  # Docker Hub password from secrets

      # Set Docker image metadata
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: amanbh858/assignment_a3

      # Build and push the Docker image to Docker Hub
      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .  # Build context (current directory)
          file: Dockerfile  # Path to Dockerfile
          push: true  # Push the image to Docker Hub
          tags: amanbh858/assignment_a3:12b8e5ff56c7  # Use your custom tag

  deploy:
    needs: build-test  # Deploy after the build-test job is successful
    runs-on: ubuntu-latest
    steps:
      # SSH Commands to deploy on the remote server
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.1.0  # SSH action to run commands on the remote server
        with:
          host: ${{ secrets.HOST }}  # Remote server host
          username: ${{ secrets.USERNAME }}  # Remote server username
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH private key for authentication

      - name: Deploy Flask App
        run: |
          echo "Deploying Flask App..."
          C:\Users\91700\Desktop\My_Assignment_A3 || exit 1  # Navigate to the deployment directory
          docker pull amanbh858/assignment_a3:12b8e5ff56c7  # Pull the updated Docker image from Docker Hub
          docker compose down  # Stop and remove the old container
          docker compose up -d  # Start the new container in detached mode

